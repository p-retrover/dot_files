[appindicator]
icon-brightness=0.0
icon-contrast=0.0
icon-opacity=240
icon-saturation=0.0
icon-size=0
tray-pos='right'

[dash-to-dock]
apply-custom-theme=false
background-opacity=0.0
click-action='focus-minimize-or-appspread'
custom-background-color=false
custom-theme-shrink=true
dash-max-icon-size=37
disable-overview-on-startup=false
dock-position='TOP'
extend-height=false
height-fraction=0.90000000000000002
hide-tooltip=false
icon-size-fixed=true
intellihide-mode='FOCUS_APPLICATION_WINDOWS'
isolate-monitors=false
max-alpha=0.80000000000000004
multi-monitor=true
preferred-monitor=-2
preferred-monitor-by-connector='eDP-1'
preview-size-scale=0.45000000000000001
running-indicator-style='DOTS'
scroll-action='do-nothing'
scroll-to-focused-application=true
show-apps-always-in-the-edge=true
show-apps-at-top=false
show-mounts-network=false
show-trash=true
transparency-mode='FIXED'

[dash-to-panel]
animate-appicon-hover-animation-extent={'RIPPLE': 4, 'PLANK': 4, 'SIMPLE': 1}
dot-position='BOTTOM'
extension-version=73
group-apps=true
hotkeys-overlay-combo='TEMPORARILY'
intellihide=false
isolate-monitors=false
panel-anchors='{"BOE-0x00000000":"MIDDLE","GSM-507NTHMM4273":"MIDDLE"}'
panel-element-positions='{"BOE-0x00000000":[{"element":"showAppsButton","visible":true,"position":"stackedTL"},{"element":"activitiesButton","visible":true,"position":"stackedTL"},{"element":"leftBox","visible":true,"position":"stackedTL"},{"element":"taskbar","visible":true,"position":"stackedTL"},{"element":"centerBox","visible":true,"position":"stackedBR"},{"element":"rightBox","visible":true,"position":"stackedBR"},{"element":"dateMenu","visible":true,"position":"stackedBR"},{"element":"systemMenu","visible":true,"position":"stackedBR"},{"element":"desktopButton","visible":true,"position":"stackedBR"}],"GSM-507NTHMM4273":[{"element":"showAppsButton","visible":true,"position":"stackedTL"},{"element":"activitiesButton","visible":true,"position":"stackedTL"},{"element":"leftBox","visible":true,"position":"stackedTL"},{"element":"taskbar","visible":true,"position":"stackedTL"},{"element":"centerBox","visible":true,"position":"stackedBR"},{"element":"rightBox","visible":true,"position":"stackedBR"},{"element":"dateMenu","visible":true,"position":"stackedBR"},{"element":"systemMenu","visible":true,"position":"stackedBR"},{"element":"desktopButton","visible":true,"position":"stackedBR"}]}'
panel-lengths='{"BOE-0x00000000":-1,"GSM-507NTHMM4273":-1}'
panel-positions='{"BOE-0x00000000":"TOP","GSM-507NTHMM4273":"TOP"}'
panel-sizes='{"BOE-0x00000000":32,"GSM-507NTHMM4273":32}'
prefs-opened=false
scroll-icon-action='NOTHING'
scroll-panel-action='NOTHING'
show-favorites=true
show-running-apps=false
window-preview-title-position='TOP'

[multi-monitors-add-on]
available-indicators=['apps-menu', 'places-menu', 'gpaste']
screenshot-on-all-monitors=true

[multi-monitors-bar]
available-indicators=@as []

[search-light]
animation-speed=100.0
blur-brightness=0.59999999999999998
blur-sigma=30.0
entry-font-size=1
monitor-count=2
popup-at-cursor-monitor=true
preferred-monitor=0
scale-height=0.10000000000000001
scale-width=0.10000000000000001
shortcut-search=['<Super>d']
show-panel-icon=false

[window-list]
embed-previews=true
grouping-mode='never'
show-on-all-monitors=true
